<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LightAgent 聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            border-bottom: 1px solid #ddd;
        }
        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        .user-msg {
            align-items: flex-end;
        }
        .ai-msg {
            align-items: flex-start;
        }
        .bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-break: break-word;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .user-msg .bubble {
            background: #4A90D9;
            color: white;
        }
        .ai-msg .bubble {
            background: #E8E8E8;
            color: #333;
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #ddd;
        }
        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        #send-btn {
            background: #4A90D9;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        #send-btn:hover {
            background: #357ABD;
        }
        /* 滚动条美化 */
        #chat-box::-webkit-scrollbar {
            width: 6px;
        }
        #chat-box::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入指令，如：打开计算器、讲个笑话... 使用 /run 执行系统操作" />
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        // 安全连接后端（如果通过 QWebChannel，否则通过 HTTP）
        var bridge = null;
        try {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                bridge = channel.objects.bridge;
                console.log('QWebChannel 已连接');
            });
        } catch(e) {
            console.log('QWebChannel 不可用，将使用 HTTP 接口');
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            var input = document.getElementById('user-input');
            var message = input.value.trim();
            if (!message) return;
            addMessage('user', message);
            input.value = '';

            if (bridge) {
                var reply = bridge.sendMessage(message);
                addMessage('ai', reply);
            } else {
                // 回退方案：通过 fetch 发送到本地 API（可根据实际情况调整）
                addMessage('ai', '桥接未连接，请稍候或直接使用 AI 控制台。');
            }
        }

        function addMessage(type, text) {
            var box = document.getElementById('chat-box');
            var div = document.createElement('div');
            div.className = 'message ' + (type === 'user' ? 'user-msg' : 'ai-msg');
            var bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            div.appendChild(bubble);
            box.appendChild(div);
            // 自动滚动到底部
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
